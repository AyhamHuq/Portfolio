services:
  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - web

  portfolio:
    build: .
    container_name: portfolio
    restart: unless-stopped
    networks:
      - web

networks:
  web:
    name: web

volumes:
  caddy_data:
  caddy_config:
